<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Leaflet Archived</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 4rem auto; padding: 1rem; color: #333; }
    .notice { border-left: 4px solid #aaa; padding: 1rem 1.5rem; background: #f8f8f8; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class='notice'>
    <h1>Leaflet Archived</h1>
    <p>This leaflet has been archived and no longer exists. Leaflets are archived when they are no longer relevant, but they can also be force-archived if the clinical review date expires. If you think this may have happened in error, you should contact the leaflet owner.</p>
  </div>
</body>
</html>
